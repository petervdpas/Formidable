name: Basic Form
filename: basic.yaml
markdown_template: ''
fields:
  - key: basic_form_test
    label: Test
    type: text
    default: Default value
    two_column: true
  - key: check
    label: Check
    type: boolean
    two_column: true
  - key: basic_form_dropdown
    label: Dropdown
    type: dropdown
    default: R
    two_column: true
    options:
      - value: L
        label: Left
      - value: R
        label: Right
  - key: basic_form_multichoice
    label: Multiple Choice
    type: multioption
    two_column: true
    options:
      - value: A
        label: Option A
      - value: B
        label: Option B
      - value: C
        label: Option C
  - key: basic_form_radio
    label: Radio
    type: radio
    default: DOG
    two_column: true
    options:
      - value: CAT
        label: Cat
      - value: DOG
        label: Dog
      - value: BIRD
        label: Bird
  - key: basic_form_mline
    label: Mline
    type: textarea
    default: A whole lot of prefab text...
  - key: basic_form_numpy
    label: Numpy
    type: number
    default: '17'
  - key: basic_form_bday
    label: Birthday
    type: date
    default: '1968-12-23'
  - key: basic_form_listy
    label: Listy
    type: list
  - key: basic_form_datable
    label: Table
    type: table
    options:
      - value: col1
        label: Column 1
      - value: col2
        label: Column 2
      - value: col3
        label: Column 3
