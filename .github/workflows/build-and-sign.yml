name: Build Formidable (Release)

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────────
  # Gate: only proceed if package.json version differs from last tag
  # ───────────────────────────────────────────────────────────────
  check_version:
    name: Verify version bumped
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.diff.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          NEW=$(node -p "require('./package.json').version")
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            echo "No prior v* tag found — proceeding with v${NEW}."
            echo "bumped=true" >> $GITHUB_OUTPUT
          elif [ "v${NEW}" = "$LAST_TAG" ]; then
            echo "Version ${NEW} already released as ${LAST_TAG} — skipping."
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            echo "Version ${NEW} differs from last tag ${LAST_TAG} — proceeding."
            echo "bumped=true" >> $GITHUB_OUTPUT
          fi

  # ───────────────────────────────────────────────────────────────
  # Windows: NSIS installer (amd64)
  # ───────────────────────────────────────────────────────────────
  windows:
    name: Windows Installer
    needs: check_version
    if: needs.check_version.outputs.bumped == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build

      - name: Collect installer
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version
          $src = "dist/Formidable Setup $version.exe"

          if (-Not (Test-Path $src)) {
            Write-Error "Expected installer file '$src' not found!"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item $src "release/Formidable.Setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Linux amd64: .deb (Debian/Ubuntu)
  # ───────────────────────────────────────────────────────────────
  linux_deb_amd64:
    name: Linux amd64 .deb
    needs: check_version
    if: needs.check_version.outputs.bumped == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App (Linux amd64 deb)
        run: npx electron-builder --linux deb --x64

      - name: Patch deb — copy assets into resources/assets
        run: |
          set -euo pipefail
          DEB=$(ls dist/*.deb)
          WORK=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORK"
          cp -r "$WORK/opt/Formidable/resources/app/assets" "$WORK/opt/Formidable/resources/assets"
          dpkg-deb -b "$WORK" "$DEB"
          rm -rf "$WORK"

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/*.deb release/formidable_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb-amd64
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Linux ARM64: .deb (Raspberry Pi)
  # ───────────────────────────────────────────────────────────────
  linux_deb_arm64:
    name: Linux ARM64 .deb (Raspberry Pi)
    needs: check_version
    if: needs.check_version.outputs.bumped == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App (Linux arm64 deb)
        run: npx electron-builder --linux deb --arm64

      - name: Patch deb — copy assets into resources/assets
        run: |
          set -euo pipefail
          DEB=$(ls dist/*.deb)
          WORK=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORK"
          cp -r "$WORK/opt/Formidable/resources/app/assets" "$WORK/opt/Formidable/resources/assets"
          dpkg-deb -b "$WORK" "$DEB"
          rm -rf "$WORK"

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/*.deb release/formidable_arm64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb-arm64
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Publish GitHub Pre-Release
  # ───────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [check_version, windows, linux_deb_amd64, linux_deb_arm64]
    if: needs.check_version.outputs.bumped == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 8 -type f -exec cp -v "{}" dist/ \;
          echo "--- Release assets ---"
          ls -la dist

      - name: Set version-based release metadata
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG_NAME=v${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_NAME=Formidable v${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
