name: Build Formidable (Release)

on:
  push:
    branches:
      - release/*
    paths:
      - package.json

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────────
  # Windows: NSIS installer (amd64)
  # ───────────────────────────────────────────────────────────────
  windows:
    name: Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run build

      - name: Collect installer
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version
          $src = "dist/Formidable Setup $version.exe"

          if (-Not (Test-Path $src)) {
            Write-Error "Expected installer file '$src' not found!"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item $src "release/Formidable Setup $version.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Linux amd64: .deb (Debian/Ubuntu)
  # ───────────────────────────────────────────────────────────────
  linux_deb_amd64:
    name: Linux amd64 .deb
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App (Linux amd64 deb)
        run: npx electron-builder --linux deb --x64

      - name: Patch deb — copy assets into resources/assets
        run: |
          set -euo pipefail
          DEB=$(ls dist/*.deb)
          WORK=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORK"
          cp -r "$WORK/opt/Formidable/resources/app/assets" "$WORK/opt/Formidable/resources/assets"
          dpkg-deb -b "$WORK" "$DEB"
          rm -rf "$WORK"

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp dist/*.deb release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb-amd64
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Linux ARM64: .deb (Raspberry Pi)
  # ───────────────────────────────────────────────────────────────
  linux_deb_arm64:
    name: Linux ARM64 .deb (Raspberry Pi)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Electron App (Linux arm64 deb)
        run: npx electron-builder --linux deb --arm64

      - name: Patch deb — copy assets into resources/assets
        run: |
          set -euo pipefail
          DEB=$(ls dist/*.deb)
          WORK=$(mktemp -d)
          dpkg-deb -R "$DEB" "$WORK"
          cp -r "$WORK/opt/Formidable/resources/app/assets" "$WORK/opt/Formidable/resources/assets"
          dpkg-deb -b "$WORK" "$DEB"
          rm -rf "$WORK"

      - name: Collect artifacts
        run: |
          mkdir -p release
          cp dist/*.deb release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-deb-arm64
          path: release/*

  # ───────────────────────────────────────────────────────────────
  # Publish GitHub Pre-Release
  # ───────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [windows, linux_deb_amd64, linux_deb_arm64]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 8 -type f -exec cp -v "{}" dist/ \;
          echo "--- Release assets ---"
          ls -la dist

      - name: Set version-based release metadata
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG_NAME=v${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_NAME=Formidable v${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
