name: Street Addresses
filename: addresses.yaml
item_field: name
markdown_template: !!str |-
  > {{field "name"}}

  {{field "unit-number"}} {{field "street-address"}} <br />
  {{field "city"}} {{field "state-abbreviation"}} {{field "postal"}} <br />
  {{field "country"}} <br />

  {{#with (fieldMeta "owners" "options") as |headers|}}
  |{{#each headers}}{{label}}{{^label}}{{value}}{{/label}} |{{/each}}
  |{{#each headers}}--|{{/each}}
  {{/with}}
  {{#each (fieldRaw "owners")}}
  |{{#each this}}{{this}} |{{/each}}
  {{/each}}
sidebar_expression: '[ F["unit-number"] + " " + F["street-address"] | { text: F["unit-number"] + " " + F["street-address"], classes: ["expr-text-blue", "expr-bold"] } ]'
enable_collection: true
gigot_enabled: true
fields:
  - key: id
    type: guid
    label: GUID
    description: ''
    expression_item: false
    two_column: false
    readonly: false
    default: ''
    options: []
    primary_key: true
  - key: name
    type: text
    label: Name
    description: Give a name to this address
    expression_item: true
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: country
    type: dropdown
    label: Country
    description: Give the country for this address
    expression_item: false
    two_column: true
    readonly: false
    default: ''
    options:
      - value: us
        label: United States
      - value: uk
        label: United Kingdom
  - key: unit-number
    type: text
    label: Unit number
    description: Give the unit number of the address
    expression_item: true
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: street-address
    type: text
    label: Street Address
    description: Give the street of the address
    expression_item: true
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: city
    type: text
    label: City
    description: Give the city for this address
    expression_item: false
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: state-abbreviation
    type: text
    label: State abbreviation
    description: Give the state abbreviation for the address
    expression_item: false
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: postal
    type: text
    label: Postal
    description: Give the postal of the address
    expression_item: false
    two_column: true
    readonly: false
    default: ''
    options: []
  - key: owners
    type: table
    label: Owners
    description: Give the owners for this address
    expression_item: false
    two_column: false
    collapsible: false
    readonly: false
    default: ''
    options:
      - value: firstname
        type: string
        label: Firstname
        choices: ''
      - value: lastname
        type: string
        label: Lastname
        choices: ''
